name: Train & Push to Hugging Face

on:
  # Run manually from the Actions tab
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of trees in the forest"
        required: false
        default: "100"
        type: string
      max_depth:
        description: "Max depth of each tree (0 = unlimited)"
        required: false
        default: "5"
        type: string
      hf_repo_id:
        description: "Hugging Face repo  (username/repo-name)"
        required: true
        default: "YOUR_USERNAME/iris-classifier"
        type: string

  # Also run automatically on every push to main
  push:
    branches:
      - main
    paths:
      - "train.py"
      - "requirements.txt"

# Only one training run at a time
concurrency:
  group: train-and-push
  cancel-in-progress: false

jobs:
  # ── 1. Validate user inputs ─────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.check.outputs.valid }}
    steps:
      - name: Check inputs
        id: check
        run: |
          N="${{ inputs.n_estimators || '100' }}"
          D="${{ inputs.max_depth    || '5'   }}"

          if ! [[ "$N" =~ ^[0-9]+$ ]] || [ "$N" -le 0 ]; then
            echo "::error::n_estimators must be a positive integer (got: $N)"
            exit 1
          fi
          if ! [[ "$D" =~ ^[0-9]+$ ]]; then
            echo "::error::max_depth must be a non-negative integer (got: $D)"
            exit 1
          fi
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "Inputs OK — n_estimators=$N  max_depth=$D"

  # ── 2. Train, evaluate, and upload ─────────────────────────────────────────
  train-and-push:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      HF_TOKEN:    ${{ secrets.HF_TOKEN }}
      # Fall back to the workflow-dispatch input; on push events use the default
      HF_REPO_ID:  ${{ inputs.hf_repo_id || 'YOUR_USERNAME/iris-classifier' }}

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Check required secrets
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not configured. Add it in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import sklearn; print('sklearn', sklearn.__version__)"
          python -c "import huggingface_hub; print('huggingface_hub', huggingface_hub.__version__)"

      # ── Train ──────────────────────────────────────────────────────────────
      - name: Train model
        run: |
          python train.py \
            --n-estimators ${{ inputs.n_estimators || 100 }} \
            --max-depth    ${{ inputs.max_depth    || 5   }} \
            2>&1 | tee training.log

      - name: Verify model artefacts exist
        run: |
          for f in model/iris_classifier.pkl model/metrics.json; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected artefact not found: $f"
              exit 1
            fi
          done
          echo "All artefacts present ✓"

      # ── Generate model card ────────────────────────────────────────────────
      - name: Generate README / model card
        run: python generate_readme.py

      # ── Upload to HF Hub ───────────────────────────────────────────────────
      - name: Upload to Hugging Face Hub
        run: python upload_to_hf.py

      # ── Save artefacts inside GitHub too ──────────────────────────────────
      - name: Upload artefacts to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: iris-model-${{ github.run_id }}
          path: |
            model/
            training.log
          retention-days: 14

      # ── Job summary ────────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🌸 Iris Classifier — Training Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| n_estimators | ${{ inputs.n_estimators || 100 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| max_depth | ${{ inputs.max_depth || 5 }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HF Repo | [${{ env.HF_REPO_ID }}](https://huggingface.co/${{ env.HF_REPO_ID }}) |" >> $GITHUB_STEP_SUMMARY

          # Append metrics if available
          if [ -f model/metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📊 Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat model/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
